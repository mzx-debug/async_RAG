<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#355C7D"/>
    </marker>
    <style>
      .title { font: 700 36px 'Microsoft YaHei', Arial, sans-serif; fill: #17324D; }
      .subtitle { font: 400 18px 'Microsoft YaHei', Arial, sans-serif; fill: #5F6F82; }
      .box-title { font: 700 22px 'Microsoft YaHei', Arial, sans-serif; fill: #17324D; }
      .box-text { font: 400 18px 'Microsoft YaHei', Arial, sans-serif; fill: #405164; }
      .small-text { font: 400 17px 'Microsoft YaHei', Arial, sans-serif; fill: #6B7B8E; }
      .edge-label { font: 700 17px 'Microsoft YaHei', Arial, sans-serif; fill: #C2542D; }
      .frame { fill: #F6F8FC; }
      .lane-a { fill: #EDF3FB; stroke: #D7E2F0; stroke-width: 2; rx: 20; }
      .lane-b { fill: #FFF4EC; stroke: #F0D6C8; stroke-width: 2; rx: 20; }
      .lane-c { fill: #EEF7F1; stroke: #D4E7D8; stroke-width: 2; rx: 20; }
      .node-main { fill: #FFFFFF; stroke: #D9E2EF; stroke-width: 2; rx: 18; }
      .node-blue { fill: #EFF5FD; stroke: #B8D0EC; stroke-width: 2; rx: 18; }
      .node-orange { fill: #FFF1E8; stroke: #F1C6AF; stroke-width: 2; rx: 18; }
      .node-green { fill: #EEF8F0; stroke: #B8DEBE; stroke-width: 2; rx: 18; }
      .bucket { fill: #FFFFFF; stroke: #CCD8E6; stroke-width: 2; rx: 16; }
      .edge { stroke: #355C7D; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edge-dashed { stroke: #4C8C78; stroke-width: 3; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      .edge-soft { stroke: #7A8EA6; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" class="frame"/>
  <rect x="0" y="0" width="1600" height="72" fill="#17324D"/>

  <text x="64" y="128" class="title">Async Bucket 调度流程示意图</text>
  <text x="64" y="162" class="subtitle">长度分桶 · 冷启动估计 · 在线观测 · EMA 回写</text>

  <rect x="60" y="210" width="1480" height="180" class="lane-a"/>
  <text x="88" y="244" class="box-title">阶段 1: 输入与分桶</text>

  <rect x="90" y="275" width="220" height="80" class="node-main"/>
  <text x="200" y="310" text-anchor="middle" class="box-title">输入 Queries</text>
  <text x="200" y="340" text-anchor="middle" class="box-text">问题流</text>

  <rect x="360" y="275" width="260" height="80" class="node-blue"/>
  <text x="490" y="308" text-anchor="middle" class="box-title">计算长度信息</text>
  <text x="490" y="340" text-anchor="middle" class="box-text">token length</text>

  <rect x="670" y="262" width="280" height="108" class="node-blue"/>
  <text x="810" y="300" text-anchor="middle" class="box-title">按长度分桶</text>
  <text x="810" y="332" text-anchor="middle" class="box-text">short / mid / long</text>
  <text x="810" y="358" text-anchor="middle" class="small-text">按长度区间分队列</text>

  <rect x="1030" y="238" width="130" height="72" class="bucket"/>
  <text x="1095" y="272" text-anchor="middle" class="box-title">short</text>
  <text x="1095" y="298" text-anchor="middle" class="small-text">队列</text>

  <rect x="1030" y="318" width="130" height="72" class="bucket"/>
  <text x="1095" y="352" text-anchor="middle" class="box-title">mid</text>
  <text x="1095" y="378" text-anchor="middle" class="small-text">队列</text>

  <rect x="1188" y="278" width="130" height="72" class="bucket"/>
  <text x="1253" y="312" text-anchor="middle" class="box-title">long</text>
  <text x="1253" y="338" text-anchor="middle" class="small-text">队列</text>

  <path d="M310 315 L360 315" class="edge"/>
  <path d="M620 315 L670 315" class="edge"/>
  <path d="M950 315 L1030 274" class="edge-soft"/>
  <path d="M950 315 L1030 354" class="edge-soft"/>
  <path d="M950 315 L1188 314" class="edge-soft"/>

  <rect x="60" y="420" width="1480" height="280" class="lane-b"/>
  <text x="88" y="454" class="box-title">阶段 2: 调度器为当前批次做决策</text>

  <rect x="100" y="495" width="260" height="90" class="node-orange"/>
  <text x="230" y="530" text-anchor="middle" class="box-title">调度器读取当前状态</text>
  <text x="230" y="560" text-anchor="middle" class="box-text">backlog / 队列 / GPU</text>

  <rect x="420" y="475" width="280" height="130" class="node-orange"/>
  <text x="560" y="514" text-anchor="middle" class="box-title">冷启动: 经验公式估计</text>
  <text x="560" y="545" text-anchor="middle" class="box-text">E / R / Transfer</text>
  <text x="560" y="571" text-anchor="middle" class="box-text">Gen / Residual</text>

  <rect x="420" y="622" width="280" height="56" class="node-main"/>
  <text x="560" y="657" text-anchor="middle" class="small-text">无观测时用经验公式</text>

  <rect x="760" y="475" width="290" height="130" class="node-orange"/>
  <text x="905" y="514" text-anchor="middle" class="box-title">在线打分</text>
  <text x="905" y="545" text-anchor="middle" class="box-text">候选 batch size</text>
  <text x="905" y="571" text-anchor="middle" class="box-text">候选 xE / xR</text>

  <rect x="1110" y="475" width="360" height="130" class="node-orange"/>
  <text x="1290" y="512" text-anchor="middle" class="box-title">选出当前最优 dispatch</text>
  <text x="1290" y="545" text-anchor="middle" class="box-text">best bucket / batch / xE xR</text>
  <text x="1290" y="571" text-anchor="middle" class="box-text">取出当前 batch</text>

  <path d="M1160 274 C1220 274, 1220 470, 1110 520" class="edge-soft"/>
  <path d="M1160 354 C1210 354, 1210 470, 1110 520" class="edge-soft"/>
  <path d="M1318 314 C1360 314, 1360 470, 1110 520" class="edge-soft"/>

  <path d="M360 540 L420 540" class="edge"/>
  <path d="M700 540 L760 540" class="edge"/>
  <path d="M1050 540 L1110 540" class="edge"/>

  <text x="714" y="500" class="edge-label">各桶独立评估</text>
  <text x="1140" y="448" class="edge-label">构造当前 batch</text>

  <rect x="60" y="730" width="1480" height="190" class="lane-c"/>
  <text x="88" y="764" class="box-title">阶段 3: 执行与反馈闭环</text>

  <rect x="110" y="800" width="280" height="82" class="node-green"/>
  <text x="250" y="835" text-anchor="middle" class="box-title">异步流水线执行</text>
  <text x="250" y="863" text-anchor="middle" class="box-text">Embedding -&gt; Retrieval -&gt; Generation</text>

  <rect x="470" y="790" width="300" height="102" class="node-green"/>
  <text x="620" y="825" text-anchor="middle" class="box-title">获得真实观测开销</text>
  <text x="620" y="855" text-anchor="middle" class="box-text">embedding / retrieval</text>
  <text x="620" y="881" text-anchor="middle" class="box-text">generation / transfer</text>

  <rect x="850" y="800" width="240" height="82" class="node-green"/>
  <text x="970" y="835" text-anchor="middle" class="box-title">EMA 指数平滑</text>
  <text x="970" y="861" text-anchor="middle" class="box-text">new = αobs + (1-α)old</text>

  <rect x="1170" y="790" width="300" height="102" class="node-green"/>
  <text x="1320" y="825" text-anchor="middle" class="box-title">回写调度器状态</text>
  <text x="1320" y="855" text-anchor="middle" class="box-text">更新动作代价</text>
  <text x="1320" y="881" text-anchor="middle" class="box-text">更新 batch size EMA</text>

  <path d="M1290 605 L1290 700 L250 700 L250 800" class="edge"/>
  <text x="980" y="688" class="edge-label">下发执行</text>
  <path d="M390 841 L470 841" class="edge"/>
  <path d="M770 841 L850 841" class="edge"/>
  <path d="M1090 841 L1170 841" class="edge"/>

  <path d="M1320 790 L1320 736 L230 736 L230 585" class="edge-dashed"/>
  <text x="760" y="724" class="edge-label">反馈闭环: 用更新后的估计继续调度</text>

  <rect x="86" y="62" width="0" height="0" fill="none"/>
</svg>
